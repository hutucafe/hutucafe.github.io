<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 | 糊塗咖啡 HUTU CAFE</title>
    <style>
        /* 基礎樣式重置 (完全對齊 abouthutu.html 格式) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif; }
        body { background-color: #f7f3f0; color: #333; line-height: 1.5; padding-bottom: 100px; }
        

        /* 內容區塊 */
        .container { max-width: 600px; margin: 0 auto; padding: 0 12px; }
        .section { background: #fff; border-radius: 16px; padding: 25px 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .section-title { font-size: 19px; font-weight: bold; border-left: 5px solid #6d4c41; padding-left: 12px; margin-bottom: 15px; color: #3e2723; }
        .about-text { font-size: 15px; color: #555; line-height: 1.8; text-align: justify; margin-bottom: 10px; }

        /* 聯絡卡片樣式 */
        .contact-card { 
            display: flex; 
            align-items: center; 
            padding: 16px 18px; 
            border-radius: 12px; 
            text-decoration: none; 
            color: #333; 
            margin-top: 15px; 
            transition: 0.3s; 
            border: 1px solid #eee; 
            background: #fafafa; 
        }
        .contact-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 6px 16px rgba(0,0,0,0.06); 
            border-color: #d7ccc8; 
            background: #fff;
        }
        
        .icon-circle { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-right: 15px; 
            flex-shrink: 0; 
            overflow: hidden; /* 確保圖片不超出圓圈 */
        }
        
        .line-icon-bg { background-color: #06C755; }
        .fb-icon-bg { background-color: #1877F2; }
        .ig-icon-bg { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        
        .contact-desc { flex: 1; }
        .contact-desc h4 { font-size: 16px; font-weight: bold; margin-bottom: 2px; color: #3e2723; }
        .contact-desc p { font-size: 13px; color: #888; }
        
        .arrow { color: #ccc; font-weight: bold; font-size: 20px; transition: 0.3s; }
        .contact-card:hover .arrow { color: #6d4c41; transform: translateX(4px); }

        /* 底部返回首頁 */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); padding: 15px 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.08); display: flex; justify-content: center; z-index: 1000; }
        .bottom-bar a { text-decoration: none; background: #3e2723; color: #fff; padding: 14px 40px; border-radius: 25px; font-size: 16px; font-weight: bold; transition: 0.3s; display: inline-block; width: 100%; max-width: 400px; text-align: center; letter-spacing: 2px; }
    </style>
    <!-- ★ 共用頁首樣式與載入器：修改 header.css / header-loader.js 即可同步所有頁面 -->
    <link rel="stylesheet" href="header.css">
    <script src="header-loader.js" defer></script>
</head>
