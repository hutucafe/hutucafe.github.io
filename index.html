<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於糊塗 | 糊塗咖啡 HUTU CAFE</title>
    <link rel="icon" href="logo2.jpg" type="image/jpeg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif; }
        body { background-color: #f7f3f0; color: #333; line-height: 1.5; padding-bottom: 120px; }
        
        header { 
            position: relative;
            background-image: url('bg.jpg');
            background-size: cover; 
            background-position: center center; 
            background-repeat: no-repeat;
            background-color: #000; 
            height: 340px; 
            display: flex;
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-end; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            margin-bottom: 25px; 
            border-top: 6px solid #000; 
        }

        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 10%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.85) 100%);
        }
        
        .header-inner { 
            width: 100%;
            max-width: 600px; 
            position: relative; 
            text-align: center; 
            z-index: 1; 
            padding: 0 20px 15px; /* 與下方的導覽列保持距離 */
        }

        .header-inner h1 { font-size: 28px; color: #fff; margin-bottom: 6px; letter-spacing: 2px; text-shadow: 0 2px 5px rgba(0,0,0,0.6); }
        .header-inner p { color: #f5f5f5; font-size: 15px; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }

        /* ✅ 關鍵修正：將導覽列獨立出來，確保其寬度不受 header-inner 限制 */
        .main-nav { 
            width: 100% !important; 
            display: flex !important; 
            justify-content: flex-start !important; 
            overflow-x: auto !important;
            gap: 10px; 
            padding: 5px 20px 15px !important; /* 20px 確保第一個頁籤「訂購頁」不貼邊 */
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; 
            position: relative;
            z-index: 2;
        }
        .main-nav::-webkit-scrollbar { display: none; }

        .nav-item { 
            flex: none !important; 
            text-decoration: none; font-size: 13px; color: #fff; padding: 8px 16px; 
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 20px; 
            background-color: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); 
            transition: 0.3s; white-space: nowrap !important; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .nav-item.active { background-color: #fff; color: #4e342e; border-color: #fff; text-shadow: none; }

        @media (max-width: 600px) {
            header { height: 280px; }
            .header-inner h1 { font-size: 24px; }
            .nav-item { padding: 6px 12px; font-size: 12px; }
        }

        .container { max-width: 600px; margin: 0 auto; padding: 0 12px; }
        .section { background: #fff; border-radius: 16px; padding: 25px 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .section-title { font-size: 19px; font-weight: bold; border-left: 5px solid #6d4c41; padding-left: 12px; margin-bottom: 15px; color: #3e2723; }
        .about-text { font-size: 15px; color: #555; line-height: 1.8; text-align: justify; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); padding: 15px 20px; display: flex; justify-content: center; z-index: 1000; }
        .bottom-bar a { text-decoration: none; background: #3e2723; color: #fff; padding: 14px 40px; border-radius: 25px; font-size: 16px; font-weight: bold; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <h1>糊塗咖啡 HUTU CAFE</h1>
            <p>職人嚴選 ‧ 極致烘焙 ‧ @hutucafe</p>
        </div>
        
        <nav class="main-nav">
            <a href="index.html" class="nav-item">訂購頁</a>
            <a href="abouthutu.html" class="nav-item active">關於糊塗</a>
            <a href="contactus.html" class="nav-item">聯絡我們</a>
            <a href="faq.html" class="nav-item">常見問題</a>
            <a href="more.html" class="nav-item">更多...</a>
        </nav>
    </header>

    <div class="container">
        <div class="section">
            <div class="section-title">🌿 品牌精神</div>
            <p class="about-text">
                糊塗咖啡 HUTU CAFE 由烘豆師牛頓王創立。我們透過科學數據烘焙，在 Coffee Review 評鑑屢獲 93、94 卓越高分。
            </p>
        </div>
    </div>

    <div class="bottom-bar">
        <a href="index.html">🛒 前往線上訂購</a>
    </div>

</body>
</html>
