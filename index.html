<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糊塗咖啡 Hutu Cafe | 專業訂購系統</title>
    <style>
        /* 基礎樣式 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif; }
        body { background-color: #f7f3f0; color: #333; line-height: 1.5; padding-bottom: 160px; }
        
        /* 頁首與導覽列設計 */
        header { background-color: #fff; padding: 25px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; border-top: 6px solid #4e342e; }
        
        .header-inner { 
            max-width: 600px; 
            margin: 0 auto; 
            position: relative; 
            text-align: center; 
            padding-right: 60px; /* 維持 Logo 空間的視覺平衡 */
        }

        .header-inner h1 { font-size: 24px; color: #3e2723; margin-bottom: 4px; letter-spacing: 2px; }
        .header-inner p { color: #8d6e63; font-size: 13px; margin-bottom: 15px; }

        .header-logo { 
            position: absolute; 
            top: -10px; 
            right: 0px; 
            width: 80px; 
            height: auto; 
            mix-blend-mode: multiply; 
        }

        /* 主導覽列 (新增) */
        .main-nav { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            overflow-x: auto; 
            padding: 5px 0;
            scrollbar-width: none; /* Firefox 隱藏捲軸 */
        }
        .main-nav::-webkit-scrollbar { display: none; } /* Chrome 隱藏捲軸 */

        .nav-item { 
            flex: none;
            text-decoration: none;
            font-size: 13px;
            color: #6d4c41;
            padding: 6px 14px;
            border: 1px solid #d7ccc8;
            border-radius: 20px;
            background-color: #fff;
            transition: 0.3s;
            white-space: nowrap;
        }
        .nav-item:hover { 
            background-color: #6d4c41; 
            color: #fff; 
            border-color: #6d4c41;
        }

        /* 內容容器 */
        .container { max-width: 600px; margin: 0 auto; padding: 0 12px; }
        .section { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .section-title { font-size: 18px; font-weight: bold; border-left: 5px solid #6d4c41; padding-left: 12px; margin-bottom: 20px; color: #3e2723; }
        
        /* 產品頁籤 (內部切換) */
        .tabs-container { display: flex; overflow-x: auto; border-bottom: 1px solid #eee; margin-bottom: 15px; gap: 10px; padding-bottom: 5px; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-btn { flex: none; padding: 8px 16px; background: #f5f5f5; border: none; border-radius: 20px; font-size: 14px; color: #777; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #6d4c41; color: #fff; font-weight: bold; }

        /* 其他 CSS 樣式 (維持原本的商品卡片、表單、結帳列等) */
        .promo-banner { background: #fff3e0; border: 1px solid #ffcc80; color: #e65100; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 15px; text-align: center; }
        .product-card { border: 1px solid #f0f0f0; border-radius: 12px; padding: 16px; margin-bottom: 16px; position: relative; }
        .bean-title { font-size: 17px; font-weight: 800; color: #3e2723; margin-bottom: 8px; display: block; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; background: #efebe9; color: #5d4037; }
        .tag-roast { background: #fff3e0; color: #e65100; font-weight: bold; }
        .flavor-box { background: #fafafa; padding: 10px; border-radius: 8px; font-size: 13px; color: #666; margin-bottom: 12px; border-left: 3px solid #d7ccc8; }
        .flavor-box span { display: block; font-size: 11px; color: #9e9e9e; }
        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; }
        .price-info .amt { font-size: 20px; font-weight: bold; color: #d84315; }
        .price-info .stock { font-size: 11px; color: #2e7d32; }
        .price-info .stock.out-of-stock { color: #d32f2f; font-weight: bold; }
        .quantity-control { display: flex; align-items: center; background: #f8f9fa; border-radius: 8px; padding: 4px; border: 1px solid #eee; }
        .quantity-control button { width: 30px; height: 30px; background: #fff; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; }
        .quantity-control input { width: 36px; text-align: center; border: none; background: none; font-size: 15px; font-weight: bold; }
        .form-group { margin-bottom: 15px; position: relative; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: bold; color: #555; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; background: #fcfcfc; }
        .suggestions-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #ddd; max-height: 200px; overflow-y: auto; z-index: 100; list-style: none; border-radius: 0 0 8px 8px; display: none; }
        .suggestions-list li { padding: 12px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 14px; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 12px 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: flex-end; z-index: 1000; }
        .calc-row { display: flex; justify-content: space-between; font-size: 13px; color: #666; }
        .total-amt { font-size: 24px; font-weight: bold; color: #d84315; }
        .bottom-bar button { background: #3e2723; color: #fff; border: none; padding: 14px 28px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; height: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <img src="logo.jpg" alt="糊塗咖啡 Logo" class="header-logo">
            <h1>糊塗咖啡 Hutu Cafe</h1>
            <p>精品生豆精選 ‧ 職人自家烘焙</p>
            
            <nav class="main-nav">
                <a href="abouthutu.html" class="nav-item">關於糊塗</a>
                <a href="contactus.html" class="nav-item">聯絡我們</a>
                <a href="suppliers.html" class="nav-item">生豆商夥伴</a>
                <a href="processintro.html" class="nav-item">處理法介紹</a>
                <a href="faq.html" class="nav-item">常見問題</a>
                <a href="pic.html" class="nav-item">相簿</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="section">
            <div class="section-title">☕ 精選豆單</div>
            <div class="promo-banner">🎉 全站商品 9 折優待！結帳滿 $1,000 再享免運費 🎉</div>
            <div id="tabs-container" class="tabs-container"></div>
            <div id="product-list">
                <p style="text-align:center; color:#999; padding:20px;">資料載入中...</p>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🏪 7-ELEVEN 取貨門市</div>
            <div class="form-group">
                <label>搜尋門市 (名稱/店號/地址) *</label>
                <input type="text" id="store-search" placeholder="例如: 集寶" autocomplete="off">
                <ul id="store-suggestions" class="suggestions-list"></ul>
            </div>
            <div class="form-group">
                <input type="text" id="store-info" readonly placeholder="尚未選擇門市">
                <input type="hidden" id="selected-store-id">
            </div>
        </div>

        <div class="section">
            <div class="section-title">📬 收件資訊</div>
            <div class="form-group"><label>姓名 *</label><input type="text" id="buyer-name"></div>
            <div class="form-group"><label>手機 *</label><input type="tel" id="buyer-phone" maxlength="10"></div>
            <div class="form-group"><label>Email</label><input type="email" id="buyer-email"></div>
            <div class="form-group"><label>備註</label><textarea id="buyer-notes" rows="2"></textarea></div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="total-info">
            <div class="calc-row"><span>商品小計</span><span id="display-original">$0</span></div>
            <div class="calc-row" style="color:#d84315;"><span>全站 9 折</span><span id="display-discount">-$0</span></div>
            <div class="calc-row"><span>運費</span><span id="display-shipping">$0</span></div>
            <div class="total-amt">$0</div>
        </div>
        <button id="submit-btn" onclick="submitOrder()">確認送出</button>
    </div>

    <script>
        /* JavaScript 邏輯 (包含 loadProducts, updateQty, calculateTotal, submitOrder 等) */
        /* 請保留您目前的 GAS_URL 與完整 Script 邏輯 */
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwvQsw3AmDqvjPl4xf8L6oWF_sAuQFRMXLNeT-o-IkUEkPJY995Jv_8h5hF63wi9rLu1w/exec';
        let allProductsData = {}; let currentTab = ''; let cart = {}; let currentFinalTotal = 0;

        async function loadProducts() {
            try {
                const res = await fetch(GAS_URL); const data = await res.json(); allProductsData = data;
                let idCounter = 1;
                for (let tab in allProductsData) {
                    allProductsData[tab].forEach(p => { p.uid = 'p_' + idCounter++; cart[p.uid] = { product: p, qty: 0 }; });
                }
                const tabs = Object.keys(allProductsData);
                if (tabs.length > 0) { currentTab = tabs[0]; renderTabs(tabs); renderProducts(currentTab); }
            } catch (e) { document.getElementById('product-list').innerHTML = "載入失敗"; }
        }

        function renderTabs(tabs) {
            const container = document.getElementById('tabs-container');
            container.innerHTML = tabs.map(tab => `<button class="tab-btn ${tab === currentTab ? 'active' : ''}" onclick="switchTab('${tab}')">${tab}</button>`).join('');
        }

        function switchTab(tabName) { currentTab = tabName; renderTabs(Object.keys(allProductsData)); renderProducts(tabName); }

        function renderProducts(tabName) {
            const listEl = document.getElementById('product-list');
            const products = allProductsData[tabName] || [];
            listEl.innerHTML = products.map(p => {
                const name = p['熟豆品項'] || '未命名'; const price = parseInt(p['售價'] || 0);
                const stock = parseInt(p['庫存']); const isOutOfStock = stock === 0;
                return `
                    <div class="product-card">
                        <span class="bean-title">${name}</span>
                        <div class="tag-group">
                            <span class="tag">${p['產區']}</span><span class="tag">${p['處理法']}</span><span class="tag tag-roast">${p['烘焙度']}</span>
                        </div>
                        <div class="flavor-box"><span>風味：</span>${p['風味']}</div>
                        <div class="card-footer">
                            <div class="price-info"><span class="amt">$${price}</span><br><span class="stock ${isOutOfStock?'out-of-stock':''}">${isOutOfStock?'無庫存':'庫存:'+stock}</span></div>
                            <div class="quantity-control">
                                <button onclick="updateQty('${p.uid}', -1)">-</button>
                                <input type="number" id="qty-${p.uid}" value="${cart[p.uid].qty}" readonly>
                                <button onclick="updateQty('${p.uid}', 1)" ${isOutOfStock?'disabled':''}>+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateQty(uid, change) {
            const p = cart[uid].product; const maxStock = parseInt(p['庫存']) || 999;
            let newVal = cart[uid].qty + change;
            if (newVal < 0) newVal = 0; if (newVal > maxStock) { alert("庫存不足"); newVal = maxStock; }
            cart[uid].qty = newVal; document.getElementById(`qty-${uid}`).value = newVal;
            calculateTotal();
        }

        function calculateTotal() {
            let originalTotal = 0; let totalItems = 0;
            for (let uid in cart) { originalTotal += cart[uid].qty * parseInt(cart[uid].product['售價'] || 0); totalItems += cart[uid].qty; }
            let discountedTotal = Math.round(originalTotal * 0.9); let discountAmt = originalTotal - discountedTotal;
            let shipping = (totalItems > 0 && discountedTotal < 1000) ? 38 : 0;
            currentFinalTotal = discountedTotal + shipping;
            document.getElementById('display-original').textContent = `$${originalTotal}`;
            document.getElementById('display-discount').textContent = `-$${discountAmt}`;
            document.getElementById('display-shipping').textContent = shipping === 0 ? "免運" : `$${shipping}`;
            document.querySelector('.total-amt').textContent = `$${currentFinalTotal}`;
        }

        /* 門市搜尋與送出訂單邏輯 (請維持與先前版本相同) */
        // ... (省略部分重複邏輯以節省空間) ...

        window.onload = loadProducts;
    </script>
</body>
</html>
