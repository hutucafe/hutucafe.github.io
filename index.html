<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUTU CAFE | 精品精品豆訂購</title>
    <style>
        /* 品牌核心色彩設定 */
        :root {
            --bg-color: #fcf9f6;        /* 燕麥暖灰 */
            --primary-coffee: #2c1810;  /* 深濃縮色 */
            --accent-clay: #8d6e63;     /* 煙燻陶土 */
            --soft-white: #ffffff;
            --border-light: #e9e2db;
            --text-muted: #7a6e67;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Optima', 'PingFang TC', '微軟正黑體', sans-serif; }
        body { background-color: var(--bg-color); color: var(--primary-coffee); line-height: 1.6; padding-bottom: 180px; }
        
        /* 頁首質感提升 */
        header { background-color: var(--soft-white); padding: 40px 20px 30px; box-shadow: 0 4px 20px rgba(44, 24, 16, 0.05); margin-bottom: 25px; border-top: 8px solid var(--primary-coffee); position: relative; }
        
        .header-inner { max-width: 600px; margin: 0 auto; position: relative; text-align: center; padding-right: 70px; }
        .header-inner h1 { font-size: 28px; font-weight: 800; color: var(--primary-coffee); margin-bottom: 6px; letter-spacing: 4px; text-transform: uppercase; }
        .header-inner p { color: var(--accent-clay); font-size: 13px; letter-spacing: 2px; margin-bottom: 20px; font-weight: 500; }

        .header-logo { position: absolute; top: -15px; right: -5px; width: 85px; height: auto; mix-blend-mode: multiply; filter: contrast(1.1); }

        /* 主導覽列 - 磨砂簡約設計 */
        .main-nav { display: flex; justify-content: center; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .main-nav::-webkit-scrollbar { display: none; }

        .nav-item { 
            flex: none; text-decoration: none; font-size: 13px; color: var(--text-muted); padding: 7px 18px; 
            border: 1px solid var(--border-light); border-radius: 50px; background-color: var(--soft-white); 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); white-space: nowrap; font-weight: 500;
        }
        .nav-item:hover { background-color: var(--primary-coffee); color: #fff; border-color: var(--primary-coffee); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* 內容區塊 */
        .container { max-width: 600px; margin: 0 auto; padding: 0 15px; }
        .section { background: var(--soft-white); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(233, 226, 219, 0.5); box-shadow: 0 10px 30px rgba(44, 24, 16, 0.03); }
        .section-title { font-size: 19px; font-weight: bold; border-left: 4px solid var(--primary-coffee); padding-left: 15px; margin-bottom: 25px; color: var(--primary-coffee); letter-spacing: 1px; }
        
        /* 內部切換頁籤 */
        .tabs-container { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 20px; padding-bottom: 5px; }
        .tab-btn { 
            flex: none; padding: 8px 18px; background: #f0edea; border: none; border-radius: 12px; 
            font-size: 14px; color: var(--text-muted); cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .tab-btn.active { background: var(--primary-coffee); color: #fff; box-shadow: 0 4px 12px rgba(44, 24, 16, 0.2); }

        /* 行銷標語 */
        .promo-banner { background: #fdf2f0; border: 1px solid #fae1dd; color: #b74a38; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-bottom: 20px; text-align: center; letter-spacing: 0.5px; }

        /* 進階豆單卡片 (對應 9 項專業資訊) */
        .product-card { border: 1px solid var(--border-light); border-radius: 18px; padding: 20px; margin-bottom: 20px; background: #fff; transition: all 0.3s ease; }
        .product-card:hover { transform: scale(1.01); border-color: var(--accent-clay); box-shadow: 0 15px 35px rgba(44, 24, 16, 0.06); }
        
        .bean-title { font-size: 19px; font-weight: 800; color: var(--primary-coffee); margin-bottom: 12px; display: block; border-bottom: 1px solid #f4f1ee; padding-bottom: 8px; }
        
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .tag { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: #f4f1ee; color: var(--accent-clay); font-weight: 600; }
        .tag-roast { background: #fff4e5; color: #a35200; border: 1px solid #ffe8cc; }

        .flavor-box { background: #fbfaf8; padding: 15px; border-radius: 12px; font-size: 14px; color: #5a4d46; margin-bottom: 15px; border: 1px solid #f0edea; line-height: 1.6; position: relative; }
        .flavor-box::before { content: "TASTING NOTES"; display: block; font-size: 9px; color: var(--accent-clay); letter-spacing: 1.5px; margin-bottom: 4px; font-weight: 800; }

        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; }
        .price-info .pkg { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .price-info .amt { font-size: 22px; font-weight: 800; color: #d84315; margin: 2px 0; display: block; }
        .price-info .stock { font-size: 11px; color: #5d8a66; font-weight: 700; background: #eff7f1; padding: 2px 8px; border-radius: 4px; }
        .price-info .stock.out-of-stock { color: #c64d4d; background: #fdf2f2; }

        .quantity-control { display: flex; align-items: center; background: #f8f6f4; border-radius: 12px; padding: 5px; border: 1px solid #eee; }
        .quantity-control button { width: 34px; height: 34px; background: #fff; border: 1px solid #e0ddd9; border-radius: 10px; cursor: pointer; font-size: 18px; color: var(--primary-coffee); font-weight: bold; }
        .quantity-control input { width: 40px; text-align: center; border: none; background: none; font-size: 16px; font-weight: 800; color: var(--primary-coffee); }
        
        /* 底部明細結帳列 */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(10px); padding: 20px 25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: flex-end; z-index: 1000; border-top: 1px solid var(--border-light); }
        .calc-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
        .total-row { border-top: 1px solid #eee; margin-top: 8px; padding-top: 8px; }
        .total-amt { font-size: 28px; font-weight: 900; color: #d84315; }
        
        #submit-btn { 
            background: var(--primary-coffee); color: #fff; border: none; padding: 16px 40px; border-radius: 15px; 
            font-size: 17px; font-weight: 800; cursor: pointer; transition: 0.3s; height: 56px; letter-spacing: 2px;
            box-shadow: 0 8px 20px rgba(44, 24, 16, 0.2);
        }
        #submit-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(44, 24, 16, 0.3); background: #3e2723; }

        /* 輸入框美化 */
        .form-group input, .form-group textarea { border: 1px solid #e0ddd9; background: #fcfcfb; border-radius: 14px; padding: 14px; font-weight: 500; }
        .form-group input:focus { border-color: var(--accent-clay); background: #fff; box-shadow: 0 0 0 4px rgba(141, 110, 99, 0.1); }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <img src="logo.jpg" alt="HUTU CAFE" class="header-logo">
            <h1>HUTU CAFE</h1>
            <p>精品生豆精選 ‧ 職人自家烘焙</p>
            
            <nav class="main-nav">
                <a href="abouthutu.html" class="nav-item">關於糊塗</a>
                <a href="contactus.html" class="nav-item">聯絡我們</a>
                <a href="suppliers.html" class="nav-item">生豆商夥伴</a>
                <a href="processintro.html" class="nav-item">處理法介紹</a>
                <a href="faq.html" class="nav-item">常見問題</a>
                <a href="pic.html" class="nav-item">相簿</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="section">
            <div class="section-title">☕ 現貨豆單訂購</div>
            <div class="promo-banner">🎉 全站商品 9 折優待中 ‧ 滿 $1,000 即享免運 🎉</div>
            <div id="tabs-container" class="tabs-container"></div>
            <div id="product-list">
                <p class="loading-text" style="text-align:center; padding:40px; color:var(--accent-clay); font-weight:600;">焙煎熟成中，請稍候...</p>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🏪 7-ELEVEN 取貨門市</div>
            <div class="form-group" style="position:relative;">
                <label>搜尋門市</label>
                <input type="text" id="store-search" placeholder="輸入門市名稱、店號或地址" autocomplete="off">
                <ul id="store-suggestions" class="suggestions-list" style="position:absolute; background:#fff; width:100%; z-index:100; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.1); list-style:none; display:none; margin-top:5px; border:1px solid #eee;"></ul>
            </div>
            <div class="form-group">
                <input type="text" id="store-info" readonly placeholder="尚未選取門市" style="background:#f8f6f4; border:none;">
                <input type="hidden" id="selected-store-id">
            </div>
        </div>

        <div class="section">
            <div class="section-title">📬 收件資訊</div>
            <div class="form-group"><label>收件姓名</label><input type="text" id="buyer-name" placeholder="請填寫真實姓名"></div>
            <div class="form-group"><label>手機號碼</label><input type="tel" id="buyer-phone" maxlength="10" placeholder="09xxxxxxxx"></div>
            <div class="form-group"><label>Email</label><input type="email" id="buyer-email" placeholder="接收訂單成立通知信"></div>
            <div class="form-group"><label>訂單備註</label><textarea id="buyer-notes" rows="2" placeholder="磨豆需求或其他特別交代"></textarea></div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="total-info" style="flex:1;">
            <div class="calc-row"><span>商品總計</span><span id="display-original">$0</span></div>
            <div class="calc-row" style="color:#d84315;"><span>9 折優惠</span><span id="display-discount">-$0</span></div>
            <div class="calc-row"><span>物流運費</span><span id="display-shipping">$0</span></div>
            <div class="calc-row total-row"><span class="total-amt" style="font-size:16px; color:var(--primary-coffee); font-weight:bold;">應付金額</span><span class="total-amt"></span></div>
        </div>
        <button id="submit-btn" onclick="submitOrder()">結帳送出</button>
    </div>

    <script>
        // ... 此處貼入您原本的 JavaScript 完整邏輯 ...
    </script>
</body>
</html>
