<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於糊塗 | 糊塗咖啡 HUTU CAFE</title>
    <link rel="icon" href="logo2.jpg" type="image/jpeg">
    <style>
        /* 基礎設定同步 index.html */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif; }
        body { background-color: #f7f3f0; color: #333; line-height: 1.5; padding-bottom: 120px; }
        
        header { 
            position: relative;
            background-image: url('bg.jpg');
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            background-color: #000; 
            height: 340px; 
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            padding: 20px; 
            margin-bottom: 25px; 
            border-top: 6px solid #000; 
        }

        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 10%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.85) 100%);
        }
        
        .header-inner { 
            width: 100%;
            max-width: 600px; 
            position: relative; 
            text-align: center; 
            z-index: 1; 
        }

        .header-inner h1 { font-size: 28px; color: #fff; margin-bottom: 6px; letter-spacing: 2px; text-shadow: 0 2px 5px rgba(0,0,0,0.6); }
        .header-inner p { color: #f5f5f5; font-size: 15px; margin-bottom: 20px; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }

        /* ✅ 終極救援：讓導覽列無視父層置中，強制滿版靠左滑動 */
        .main-nav { 
            display: flex !important; 
            justify-content: flex-start !important; /* 強制靠左 */
            overflow-x: auto !important;            /* 啟用橫向滑動 */
            gap: 10px; 
            padding: 10px 20px !important;           /* 增加左右內距防止第一個字被螢幕切掉 */
            margin: 0 -20px -5px !important;        /* 用負邊距把導覽列推到螢幕邊緣 */
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; 
            text-align: left !important;            /* 覆蓋父層 center 設定 */
            width: calc(100% + 40px) !important;    /* 確保寬度撐開 */
        }
        .main-nav::-webkit-scrollbar { display: none; }

        .nav-item { 
            flex: none !important;                  /* 禁止壓縮，維持按鈕寬度 */
            text-decoration: none; font-size: 13px; color: #fff; padding: 8px 16px; 
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 20px; 
            background-color: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); transition: 0.3s; 
            white-space: nowrap !important;         /* 絕對不換行 */
        }
        .nav-item.active { background-color: #fff; color: #4e342e; border-color: #fff; font-weight: bold; }

        @media (max-width: 600px) {
            header { height: 280px; padding: 15px; }
            .nav-item { padding: 6px 12px; font-size: 12px; }
        }

        .container { max-width: 600px; margin: 0 auto; padding: 0 12px; }
        .section { background: #fff; border-radius: 16px; padding: 25px 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .section-title { font-size: 19px; font-weight: bold; border-left: 5px solid #6d4c41; padding-left: 12px; margin-bottom: 15px; color: #3e2723; }
        .about-text { font-size: 15px; color: #555; line-height: 1.8; text-align: justify; margin-bottom: 15px; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); padding: 15px 20px; display: flex; justify-content: center; z-index: 1000; }
        .bottom-bar a { text-decoration: none; background: #3e2723; color: #fff; padding: 14px 40px; border-radius: 25px; font-size: 16px; font-weight: bold; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <h1>糊塗咖啡 HUTU CAFE</h1>
            <p>職人嚴選 ‧ 極致烘焙 ‧ @hutucafe</p>
            
            <nav class="main-nav">
                <a href="index.html" class="nav-item">訂購頁</a>
                <a href="abouthutu.html" class="nav-item active">關於糊塗</a>
                <a href="contactus.html" class="nav-item">聯絡我們</a>
                <a href="faq.html" class="nav-item">常見問題</a>
                <a href="more.html" class="nav-item">更多...</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="section">
            <div class="section-title">🌿 品牌精神</div>
            <p class="about-text">糊塗咖啡 HUTU CAFE 由烘豆師牛頓王創立。</p>
            <p class="about-text">我們透過數據烘焙，在 Coffee Review 評鑑屢獲 93、94 卓越高分。</p>
        </div>
    </div>

    <div class="bottom-bar">
        <a href="index.html">🛒 前往線上訂購</a>
    </div>

</body>
</html>
