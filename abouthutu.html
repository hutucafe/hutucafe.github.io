<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於糊塗 | 糊塗咖啡 HUTU CAFE</title>
    <link rel="icon" href="logo2.jpg" type="image/jpeg">
    <style>
        /* 基礎樣式比照 index.html */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif; }
        body { background-color: #f7f3f0; color: #333; line-height: 1.5; padding-bottom: 100px; }
        
        header { 
            position: relative;
            background-image: url('bg.jpg');
            background-size: auto 100%; 
            background-position: center center; 
            background-repeat: no-repeat;
            background-color: #000; 
            height: 340px; 
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            margin-bottom: 25px; 
            border-top: 6px solid #000; 
        }

        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 10%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.85) 100%);
        }
        
        .header-inner { 
            width: 100%;
            max-width: 600px; 
            position: relative; 
            text-align: center; 
            z-index: 1; 
            padding-bottom: 5px; 
        }

        .header-inner h1 { font-size: 28px; color: #fff; margin-bottom: 6px; letter-spacing: 2px; text-shadow: 0 2px 5px rgba(0,0,0,0.6); }
        .header-inner p { color: #f5f5f5; font-size: 15px; margin-bottom: 20px; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }

        /* ✅ 完全比照 index.html 的導覽列 CSS */
        .main-nav { 
            display: flex; 
            justify-content: flex-start; 
            overflow-x: auto; 
            gap: 10px; 
            padding: 5px 10px; 
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; 
        }
        .main-nav::-webkit-scrollbar { display: none; }

        .nav-item { 
            flex: none; 
            text-decoration: none; 
            font-size: 13px; 
            color: #fff; 
            padding: 8px 16px; 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 20px; 
            background-color: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); 
            transition: 0.3s; 
            white-space: nowrap; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .nav-item:hover, .nav-item.active { 
            background-color: #fff; 
            color: #4e342e; 
            border-color: #fff; 
            text-shadow: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        @media (max-width: 600px) {
            header { height: 280px; padding: 15px; background-size: cover; }
            .header-inner h1 { font-size: 24px; }
            .header-inner p { font-size: 13px; margin-bottom: 15px; }
            .nav-item { padding: 6px 12px; font-size: 12px; }
        }

        .container { max-width: 600px; margin: 0 auto; padding: 0 12px; }
        .section { background: #fff; border-radius: 16px; padding: 25px 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .section-title { font-size: 19px; font-weight: bold; border-left: 5px solid #6d4c41; padding-left: 12px; margin-bottom: 15px; color: #3e2723; }
        
        /* ...其餘內容樣式保持不變... */
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>糊塗咖啡 HUTU CAFE</h1>
            <p>職人嚴選 ‧ 極致烘焙 ‧ @hutucafe</p>
            
            <nav class="main-nav">
                <a href="index.html" class="nav-item">訂購頁</a>
                <a href="abouthutu.html" class="nav-item active">關於糊塗</a>
                <a href="contactus.html" class="nav-item">聯絡我們</a>
                <a href="faq.html" class="nav-item">常見問題</a>
                <a href="more.html" class="nav-item">更多...</a>
            </nav>
        </div>
    </header>

    <div class="container">
        </div>
</body>
</html>
